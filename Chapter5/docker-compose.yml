# Опционально: Postgres + Redis для pgx / внешнего кэша.
# Примеры и app по умолчанию работают на SQLite + miniredis без Docker.
# postgres://study:study@localhost:5432/study5?sslmode=disable
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: study5
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d study5"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
